{% extends "base.html" %}{% block title %}编辑任务{% endblock %}{% block content %}
<header class="page-head"><div><p class="eyebrow">TASK / EDIT</p><h1>编辑任务</h1></div><a class="btn ghost" href="{{ url_for('main.tasks') }}"><i data-lucide="arrow-left"></i> 返回</a></header>
<section class="panel narrow-panel"><form method="post" class="stack-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<label>任务标题<input name="title" value="{{ task.title }}" required></label><div class="form-grid"><label>分类<select name="category">{% for v in ['实验','论文','学习','会议','行政'] %}<option {{ 'selected' if task.category == v }}>{{ v }}</option>{% endfor %}</select></label><label>优先级<select name="priority">{% for v in ['高','中','低'] %}<option {{ 'selected' if task.priority == v }}>{{ v }}</option>{% endfor %}</select></label><label>截止日期<input type="date" name="deadline" value="{{ task.deadline or '' }}"></label></div><label>备注<textarea name="notes" rows="5">{{ task.notes }}</textarea></label><div class="form-actions"><button class="btn primary">保存修改</button></div>
</form></section>{% endblock %}
