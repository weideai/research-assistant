{% extends "base.html" %}{% block title %}编辑样本{% endblock %}{% block content %}<header class="page-head"><div><p class="eyebrow">SAMPLE / EDIT</p><h1>{{ sample.sample_code }}</h1></div><a class="btn ghost" href="{{ url_for('main.samples') }}"><i data-lucide="arrow-left"></i> 返回</a></header><section class="panel narrow-panel"><form method="post" class="stack-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="form-grid"><label>样本编号<input name="sample_code" value="{{ sample.sample_code }}" required></label><label>类型<input name="sample_type" value="{{ sample.sample_type }}"></label><label>来源<input name="source" value="{{ sample.source }}"></label><label>数量<input name="quantity" value="{{ sample.quantity }}"></label><label>状态<select name="status">{% for v in ['可用','使用中','耗尽','异常'] %}<option {{ 'selected' if sample.status == v }}>{{ v }}</option>{% endfor %}</select></label></div><label>存放位置<input name="location" value="{{ sample.location }}"></label><label>备注<textarea name="notes" rows="5">{{ sample.notes }}</textarea></label><div class="form-actions"><button class="btn primary">保存修改</button></div></form></section>{% endblock %}
