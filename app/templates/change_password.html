{% extends "base.html" %}{% block title %}账号安全{% endblock %}{% block content %}<header class="page-head"><div><p class="eyebrow">ACCOUNT SECURITY</p><h1>账号安全</h1><p class="muted">修改密码会让其他设备上的登录状态立即失效。</p></div><span class="badge large"><i data-lucide="shield-check"></i>{{ current_user.role }}</span></header><section class="panel narrow-panel"><form method="post" class="stack-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>当前密码<input type="password" name="current_password" required autocomplete="current-password"></label><label>新密码<input type="password" name="new_password" minlength="12" required autocomplete="new-password" placeholder="至少 12 位，含大小写字母和数字"></label><div class="form-actions"><button class="btn primary"><i data-lucide="key-round"></i> 修改密码并撤销其他会话</button></div></form></section>{% endblock %}
